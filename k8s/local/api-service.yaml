apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: chess-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: chess-lab-api:local
          imagePullPolicy: Never
          env:
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: chess-lab-config
                  key: SPRING_RABBITMQ_HOST
            - name: STOCKFISH_DEPTH
              valueFrom:
                configMapKeyRef:
                  name: chess-lab-config
                  key: STOCKFISH_DEPTH
            - name: ANALYSIS_MAX_PLIES
              valueFrom:
                configMapKeyRef:
                  name: chess-lab-config
                  key: ANALYSIS_MAX_PLIES
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: chess-lab
spec:
  selector:
    app: api-service
  ports:
    - name: http
      port: 8080
      targetPort: http
